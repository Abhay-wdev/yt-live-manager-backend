<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>G Records - Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen p-8">

  <header class="mb-8">
    <div class="flex justify-between items-center">
      <div>
        <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">Neon Space Shooter Studio</h1>
        <p class="text-slate-400 mt-1">Pure Node.js Server Recording Monitor</p>
      </div>
      <div id="statusIndicator" class="bg-slate-800 text-slate-300 px-4 py-2 rounded-full border border-slate-700 font-bold">
        Ready
      </div>
    </div>
  </header>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <!-- LEFT COL: Game -->
    <div class="bg-slate-800 p-4 rounded-lg border border-slate-700 flex flex-col items-center">
      <div class="flex w-full justify-between items-center mb-4">
        <h2 class="text-xl font-semibold">Live Server Monitor</h2>
        <div class="text-green-400 font-bold">Score: <span id="lblScore">0</span></div>
      </div>
      
      <canvas id="gameCanvas" width="540" height="960" class="border border-slate-600 rounded bg-black max-w-full h-auto"></canvas>
      
      <div class="mt-4 text-slate-400 text-sm w-full text-center">
        Server is authoritative. Rendering frames via WebSocket.
      </div>
    </div>

    <!-- RIGHT COL: Controls -->
    <div class="space-y-6">
      <div class="bg-slate-800 p-6 rounded-lg border border-slate-700">
        <h2 class="text-2xl font-semibold mb-6">Recording Controls</h2>
        
        <div class="mb-4">
          <label class="block text-slate-400 mb-2">Auto-Restart Target Count</label>
          <div class="flex gap-2">
            <input type="number" id="inpLoopCount" value="1" min="1" class="w-full bg-slate-900 border border-slate-700 rounded p-3 text-white font-bold">
            <button id="btnInfiniteToggle" class="bg-slate-700 hover:bg-slate-600 px-4 rounded border border-slate-600 whitespace-nowrap text-sm font-bold transition">
              Set Infinite
            </button>
          </div>
        </div>

        <div class="flex flex-col gap-4">
          <button id="btnStart" class="bg-green-600 hover:bg-green-700 text-white p-4 rounded text-xl font-bold transition">
            Start Server Recording
          </button>
          <button id="btnStop" class="bg-red-600 hover:bg-red-700 text-white p-4 rounded text-xl font-bold transition opacity-50 cursor-not-allowed" disabled>
            Stop Server Recording
          </button>
        </div>
        
        <div id="uploadProgress" class="hidden mt-6">
          <p class="text-sm text-slate-400 mb-2">Processing Video on Server...</p>
          <div class="w-full bg-slate-900 rounded h-2">
            <div class="bg-blue-500 h-2 rounded animate-pulse" style="width: 100%"></div>
          </div>
        </div>
      </div>

      <div class="bg-slate-800 p-4 rounded-lg border border-slate-700">
        <h2 class="text-xl font-semibold mb-4">Your Video Library</h2>
        <div class="mb-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <input type="checkbox" id="selectAllCheckbox" class="w-4 h-4 cursor-pointer" onclick="toggleSelectAll(this)">
                <label for="selectAllCheckbox" class="text-sm cursor-pointer select-none">Select All</label>
            </div>
            <button id="btnDeleteSelected" onclick="deleteSelected()" disabled class="bg-red-900 hover:bg-red-800 text-red-100 px-3 py-1 rounded text-sm font-bold opacity-50 cursor-not-allowed transition">
                Delete Selected (0)
            </button>
        </div>
        <div id="libraryList" class="space-y-2 text-sm text-slate-400">
          Fetching library...
        </div>
      </div>
    </div>
  </div>

<script>
  const socket = io();
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const backendUrl = window.location.hostname === 'localhost' ? 'http://localhost:5000' : '';

  let isInfinite = false;
  let loopCountTarget = 1;

  document.getElementById('btnInfiniteToggle').addEventListener('click', () => {
    isInfinite = !isInfinite;
    const inp = document.getElementById('inpLoopCount');
    if (isInfinite) {
      inp.type = 'text';
      inp.value = 'Infinite';
      inp.disabled = true;
    } else {
      inp.type = 'number';
      inp.value = '1';
      inp.disabled = false;
    }
  });

  document.getElementById('btnStart').addEventListener('click', async () => {
    initAudio();
    loopCountTarget = isInfinite ? -1 : parseInt(document.getElementById('inpLoopCount').value || 1);
    try {
      const res = await fetch(`${backendUrl}/api/recordings/generate`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ loops: loopCountTarget })
      });
      const data = await res.json();
      if (data.success) {
        // UI updates handled by socket 'PROCESSING_START'
      }
    } catch (err) {
      alert('Failed to start server recording: ' + err.message);
    }
  });

  document.getElementById('btnStop').addEventListener('click', async () => {
    socket.emit('studio_command', { action: 'STOP_RECORDING' });
  });

  socket.on('studio_command', (cmd) => {
    if (cmd.action === 'PROCESSING_START') {
      document.getElementById('uploadProgress').classList.remove('hidden');
      document.getElementById('statusIndicator').innerText = "Recording Active";
      document.getElementById('statusIndicator').className = "bg-blue-900 text-blue-300 px-4 py-2 rounded-full border border-blue-700 font-bold";
      document.getElementById('btnStart').disabled = true;
      document.getElementById('btnStart').classList.add('opacity-50', 'cursor-not-allowed');
      document.getElementById('btnStop').disabled = false;
      document.getElementById('btnStop').classList.remove('opacity-50', 'cursor-not-allowed');
    }
    if (cmd.action === 'PROCESSING_COMPLETE') {
      document.getElementById('uploadProgress').classList.add('hidden');
      document.getElementById('statusIndicator').innerText = "Ready";
      document.getElementById('statusIndicator').className = "bg-slate-800 text-slate-300 px-4 py-2 rounded-full border border-slate-700 font-bold";
      document.getElementById('btnStart').disabled = false;
      document.getElementById('btnStart').classList.remove('opacity-50', 'cursor-not-allowed');
      document.getElementById('btnStop').disabled = true;
      document.getElementById('btnStop').classList.add('opacity-50', 'cursor-not-allowed');
      loadLibrary();
    }
  });

  let prevBullets = 0;
  let prevEnemies = 0;
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    if (type === 'shoot') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(880, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.1);
      gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    } else if (type === 'explosion') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(100, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.2);
    }
  }

  socket.on('studio_broadcast_frame', (state) => {
    document.getElementById('lblScore').innerText = state.score;
    renderState(state);

    if (state.bullets.length > prevBullets) playSound('shoot');
    // If enemies decreased, we count it as an explosion (hit)
    // Could also just compare state.particles.length for explosions
    if (state.particles.length > prevParticles) playSound('explosion');

    prevBullets = state.bullets.length;
    prevEnemies = state.enemies.length;
    prevParticles = state.particles.length;
  });

  let prevParticles = 0;

  const svgCache = {};
  const svgNames = ['rocket', 'scout-ship', 'alien-stare', 'alien-skull', 'glider', 'drill', 'grease-trap'];
  svgNames.forEach(name => {
    const img = new Image();
    img.src = `/assets/svg/${name}.svg`;
    svgCache[name] = img;
  });

  function renderState(state) {
    ctx.save();
    if (state.shakeTime > 0) {
      const magnitude = (state.shakeTime / 30) * 10;
      ctx.translate((Math.random() - 0.5) * magnitude, (Math.random() - 0.5) * magnitude);
    }

    const bgGradient = ctx.createLinearGradient(0, 0, 0, 960);
    bgGradient.addColorStop(0, "#020617");
    bgGradient.addColorStop(1, "#1e1b4b");
    ctx.fillStyle = bgGradient;
    ctx.fillRect(0, 0, 540, 960);

    ctx.fillStyle = '#ffffff';
    drawStars(state.bgY1, 150, 1, 0.3);
    drawStars(state.bgY2, 70, 2, 0.6);
    drawStars(state.bgY3, 30, 3, 1.0);

    drawPlayer(state.player.x, state.player.y, state.player.w, state.player.h);

    ctx.globalCompositeOperation = 'screen';
    ctx.fillStyle = 'rgba(34, 211, 238, 0.5)';
    ctx.fillRect(state.player.x - 20, state.player.y + state.player.h - 10, state.player.w + 40, 30 + Math.random()*15);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
    ctx.fillRect(state.player.x + 10, state.player.y + state.player.h - 5, state.player.w - 20, 15 + Math.random()*10);
    ctx.globalCompositeOperation = 'source-over';

    state.bullets.forEach(b => {
      ctx.fillStyle = 'rgba(217, 70, 239, 0.4)';
      ctx.fillRect(b.x - 3, b.y - 3, b.w + 6, b.h + 6);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(b.x, b.y, b.w, b.h);
    });

    state.enemies.forEach(e => drawEnemy(e.type, e.x, e.y, e.w, e.h));

    ctx.globalCompositeOperation = 'screen';
    state.particles.forEach(p => {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, p.life / 50);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fill();
    });
    ctx.globalAlpha = 1.0;
    ctx.globalCompositeOperation = 'source-over';

    ctx.font = "bold 20px monospace";
    ctx.textAlign = "center";
    state.floatingTexts.forEach(ft => {
      ctx.fillStyle = `rgba(134, 239, 172, ${Math.max(0, ft.life / 40)})`;
      ctx.fillText(ft.text, ft.x, ft.y);
    });

    ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
    for(let i = 0; i < 960; i += 4) ctx.fillRect(0, i, 540, 2);

    ctx.restore();
  }

  function drawStars(yOffset, count, radius, alpha) {
    ctx.globalAlpha = alpha;
    for (let i = 0; i < count; i++) {
      const x = (Math.sin(i * 123.45) * 0.5 + 0.5) * 540;
      const staticY = (Math.cos(i * 321.65) * 0.5 + 0.5) * 960;
      const y = (staticY + yOffset) % 960;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1.0;
  }

  function drawPlayer(x, y, w, h) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(w / 100, h / 100);
    ctx.strokeStyle = '#06b6d4';
    ctx.lineWidth = 6;
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.moveTo(50, 15); ctx.lineTo(95, 65); ctx.lineTo(95, 95); ctx.lineTo(50, 75); ctx.lineTo(5, 95); ctx.lineTo(5, 65);
    ctx.closePath(); ctx.stroke();
    ctx.globalAlpha = 1.0;
    ctx.fillStyle = '#082f49'; ctx.strokeStyle = '#22d3ee'; ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(50, 20); ctx.lineTo(90, 60); ctx.lineTo(90, 90); ctx.lineTo(50, 70); ctx.lineTo(10, 90); ctx.lineTo(10, 60);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#64748b'; ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 2;
    ctx.fillRect(18, 40, 10, 30); ctx.strokeRect(18, 40, 10, 30);
    ctx.fillRect(72, 40, 10, 30); ctx.strokeRect(72, 40, 10, 30);
    ctx.fillStyle = '#bae6fd';
    ctx.beginPath();
    ctx.moveTo(50, 28); ctx.lineTo(65, 58); ctx.lineTo(50, 70); ctx.lineTo(35, 58);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  function drawEnemy(type, x, y, w, h) {
    const img = svgCache[type];
    if (img && img.complete) {
      ctx.drawImage(img, x, y, w, h);
    } else {
      ctx.fillStyle = '#450a0a';
      ctx.fillRect(x, y, w, h);
    }
  }

  async function loadLibrary() {
    try {
      const res = await fetch(`${backendUrl}/api/recordings`);
      const files = await res.json();
      const list = document.getElementById('libraryList');
      if (files.length === 0) {
        list.innerHTML = '<div class="p-4 bg-slate-900 rounded text-center">No videos yet.</div>';
        return;
      }
      list.innerHTML = files.map(f => `
        <div class="flex justify-between items-center bg-slate-900 p-3 rounded hover:bg-slate-800 transition">
          <div class="flex items-center gap-3 w-full">
            <input type="checkbox" class="video-checkbox w-4 h-4 cursor-pointer" value="${f}" onchange="updateDeleteSelectedButton()">
            <a href="/recordings/${f}" target="_blank" class="text-blue-400 hover:text-blue-300 truncate w-64">${f}</a>
          </div>
          <div class="flex gap-2">
            <button onclick="renameVideo('${f}')" class="text-xs bg-slate-700 hover:bg-slate-600 px-2 py-1 rounded">Rename</button>
            <button onclick="deleteVideo('${f}')" class="text-xs bg-red-900 hover:bg-red-800 text-red-100 px-2 py-1 rounded">Delete</button>
          </div>
        </div>
      `).join('');
      updateDeleteSelectedButton();
    } catch (e) {
      document.getElementById('libraryList').innerHTML = '<div class="text-red-400">Failed to load library</div>';
    }
  }

  async function deleteVideo(filename) {
    if (!confirm('Delete ' + filename + '?')) return;
    try {
      const res = await fetch(`${backendUrl}/api/recordings/${filename}`, { method: 'DELETE' });
      if (res.ok) loadLibrary();
      else alert('Failed to delete video');
    } catch (e) { alert('Error deleting video'); }
  }

  function toggleSelectAll(checkbox) {
    document.querySelectorAll('.video-checkbox').forEach(cb => cb.checked = checkbox.checked);
    updateDeleteSelectedButton();
  }

  function updateDeleteSelectedButton() {
    const checked = document.querySelectorAll('.video-checkbox:checked').length;
    const btn = document.getElementById('btnDeleteSelected');
    if (checked > 0) {
      btn.disabled = false;
      btn.classList.remove('opacity-50', 'cursor-not-allowed');
      btn.innerText = `Delete Selected (${checked})`;
    } else {
      btn.disabled = true;
      btn.classList.add('opacity-50', 'cursor-not-allowed');
      btn.innerText = `Delete Selected (0)`;
    }
  }

  async function deleteSelected() {
    const files = Array.from(document.querySelectorAll('.video-checkbox:checked')).map(cb => cb.value);
    if (files.length === 0) return;
    if (!confirm(`Delete ${files.length} videos?`)) return;
    try {
      const res = await fetch(`${backendUrl}/api/recordings/bulk-delete`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ filenames: files })
      });
      if (res.ok) loadLibrary();
      else alert('Failed to delete videos');
    } catch (e) { alert('Error deleting videos'); }
  }

  async function renameVideo(filename) {
    const newName = prompt(`Enter new name for ${filename}:`, filename.replace('.mp4', ''));
    if (!newName || newName.trim() === '') return;
    try {
      const res = await fetch(`${backendUrl}/api/recordings/${filename}`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ newFilename: newName })
      });
      if (res.ok) loadLibrary();
      else alert('Failed to rename video');
    } catch (e) { alert('Error renaming video'); }
  }

  loadLibrary();
</script>
</body>
</html>
