<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>G Records - Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen p-8">

  <header class="mb-8">
    <div class="flex justify-between items-center">
      <div>
        <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">Neon Space Shooter Studio</h1>
        <p class="text-slate-400 mt-1">Play, Record, and Auto-Upload MP4s.</p>
      </div>
      <div id="statusIndicator" class="bg-slate-800 text-slate-300 px-4 py-2 rounded-full border border-slate-700 font-bold">
        Ready
      </div>
    </div>
  </header>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <!-- LEFT COL: Game -->
    <div class="bg-slate-800 p-4 rounded-lg border border-slate-700 flex flex-col items-center">
      <div class="flex w-full justify-between items-center mb-4">
        <h2 class="text-xl font-semibold">Live Game Area</h2>
        <div class="text-green-400 font-bold">Score: <span id="lblScore">0</span></div>
      </div>
      
      <canvas id="gameCanvas" width="540" height="960" class="border border-slate-600 rounded bg-black"></canvas>
      
      <div class="mt-4 text-slate-400 text-sm w-full text-center">
        Controls: ARROW KEYS to move. SPACEBAR to shoot.
      </div>
    </div>

    <!-- RIGHT COL: Controls -->
    <div class="space-y-6">
      <div class="bg-slate-800 p-6 rounded-lg border border-slate-700">
        <h2 class="text-2xl font-semibold mb-6">Recording & Auto-Player Controls</h2>
        
        <div class="mb-4">
          <label class="block text-slate-400 mb-2">Auto-Restart Target Count (Manually Enter)</label>
          <div class="flex gap-2">
            <input type="number" id="inpLoopCount" value="1" min="1" class="w-full bg-slate-900 border border-slate-700 rounded p-3 text-white font-bold">
            <button id="btnInfiniteToggle" class="bg-slate-700 hover:bg-slate-600 px-4 rounded border border-slate-600 whitespace-nowrap text-sm font-bold transition">
              Set Infinite
            </button>
          </div>
        </div>

        <div class="flex flex-col gap-4">
          <button id="btnStart" class="bg-green-600 hover:bg-green-700 text-white p-4 rounded text-xl font-bold transition">
            Start Auto-Player & Record
          </button>
          <button id="btnStop" class="bg-red-600 hover:bg-red-700 text-white p-4 rounded text-xl font-bold transition opacity-50 cursor-not-allowed" disabled>
            Stop Auto-Player
          </button>
        </div>
        
        <div id="uploadProgress" class="hidden mt-6">
          <p class="text-sm text-slate-400 mb-2">Processing & Uploading...</p>
          <div class="w-full bg-slate-900 rounded h-2">
            <div class="bg-blue-500 h-2 rounded animate-pulse" style="width: 100%"></div>
          </div>
        </div>
      </div>

      <div class="bg-slate-800 p-4 rounded-lg border border-slate-700">
        <h2 class="text-xl font-semibold mb-4">Your Video Library</h2>
        <div id="libraryList" class="space-y-2 text-sm text-slate-400">
          Fetching library...
        </div>
      </div>
    </div>
  </div>

      `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" style="height: 512px; width: 512px;"><defs><linearGradient id="delapouite-jet-fighter-gradient-1"><stop offset="0%" stop-color="#fe1317" stop-opacity="1"></stop><stop offset="100%" stop-color="#fff700" stop-opacity="1"></stop></linearGradient></defs><rect fill="url(#pattern)" fill-opacity="1" stroke="#fff" stroke-opacity="1" stroke-width="326" height="-140" width="-140" rx="32" ry="32"></rect><g class="" style="" transform="translate(2,0)"><path d="M461.5 31.85c-5 1.2-10.4 3.4-16.4 6.4-12 6-26.7 15.3-42.1 26.1-26.7 18.7-55.5 41.75-75 59.95l39.8 19.9 19.9 39.8c18.2-19.5 41.2-48.3 59.9-75 10.8-15.35 20.1-30.05 26.2-42.15 3-6 5.2-11.3 6.3-16.3 1.2-5 1.9-10.9-2.9-15.7-4.8-4.56-10-4.25-15.7-3zm-14.8 33.4c4.9 4.71 5.6 12.1 3.8 18.7-1.8 6.6-6.1 13.3-12.9 20.15l-42.2 42.2-29.6-29.7L408 74.45c6.8-6.8 13.5-11.06 20.1-12.9 6.1-1.71 14.3-.44 18.6 3.7zM183.2 109.5l-21.3 21.2 45.6 5v-26.2zm129.9 25.2-43.5 21.8-153 200.1 13.7 13.8 97.5-97.5 11.3 11.3c-32.5 32.5-65 65.1-97.5 97.6l13.8 13.6 200.1-153 21.8-43.5-21.4-42.8zm-256.59.4 7.4 22.2 120.99 83.5 64.5-84.3zm38.1 62.8-13.1 13.2 24.39 24.3 17.6-17.5zm260.89 64.7-84.3 64.5 83.5 121 22.2 7.3zm-190.9 4.8-110.99 9.1-22.6 22.6 82.39 35.4zm212.1 41.2 4.6 41.5 17.1-17.2v-24.3zm-132.1 38.8-67 51.2 35.3 82.4 22.6-22.6zm-138.7 21.2-13.09 13.1 37.49 37.4 13.1-13zm188.2 19.9-17.5 17.6 24.3 24.3 13.2-13.1z" fill="url(#delapouite-jet-fighter-gradient-1)" transform="translate(76.8, 76.8) scale(0.7, 0.7) rotate(45, 256, 256) skewX(0) skewY(0)"></path></g></svg>`
    ];

    svgs.forEach(svg => {
      const img = new Image();
      img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
      enemyImages.push(img);
    });

    // --- PLAYER SVG ---
    const playerImg = new Image();
    const playerSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <defs>
        <linearGradient id="hull" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#94a3b8"/>
        </linearGradient>
        <linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#22d3ee"/>
          <stop offset="100%" stop-color="#0369a1"/>
        </linearGradient>
        <filter id="glow"><feGaussianBlur stdDeviation="3" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <!-- Neon aura -->
      <polygon points="50,15 95,65 95,95 50,75 5,95 5,65" fill="none" stroke="#06b6d4" stroke-width="6" opacity="0.6" filter="url(#glow)"/>
      <polygon points="50,20 90,60 90,90 50,70 10,90 10,60" fill="url(#hull)" stroke="#22d3ee" stroke-width="3" stroke-linejoin="round"/>
      <rect x="18" y="40" width="10" height="30" fill="#64748b" stroke="#38bdf8" stroke-width="2"/>
      <rect x="72" y="40" width="10" height="30" fill="#64748b" stroke="#38bdf8" stroke-width="2"/>
      <polygon points="50,28 65,58 50,70 35,58" fill="url(#glass)" stroke="#bae6fd" stroke-width="2"/>
    </svg>`;
    playerImg.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(playerSvg);

    // --- VISUAL FX STATE ---
    let shakeTime = 0;
    let floatingTexts = [];
    let bgY1 = 0, bgY2 = 0, bgY3 = 0;
    
    // Cache the static background gradient
    const bgGradient = ctx.createLinearGradient(0, 0, 0, 960);
    bgGradient.addColorStop(0, "#020617"); // slate-950
    bgGradient.addColorStop(1, "#1e1b4b"); // indigo-950

    // Generate static star layers once
    const starLayers = [ [], [], [] ];
    for(let i=0; i<150; i++) starLayers[0].push({ x: Math.random()*540, y: Math.random()*960, r: 1 });
    for(let i=0; i<70; i++)  starLayers[1].push({ x: Math.random()*540, y: Math.random()*960, r: 2 });
    for(let i=0; i<30; i++)  starLayers[2].push({ x: Math.random()*540, y: Math.random()*960, r: 3 });

    // --- RECORDING STATE ---
    let mediaRecorder;
    let recordedChunks = [];
    let loopCountTarget = 0;
    let currentLoop = 0;
    let isUploading = false;

    let audioCtx;
    let audioDest;

    function playTone(freq, type, duration, vol) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(freq * 0.1, audioCtx.currentTime + duration);
      
      gain.gain.setValueAtTime(vol, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
      
      osc.connect(gain);
      gain.connect(audioCtx.destination); // For speakers
      gain.connect(audioDest);            // For recording stream
      
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function playShoot() { playTone(800, 'square', 0.1, 0.1); }
    function playExplosion() { playTone(150, 'sawtooth', 0.3, 0.2); }
    function playGameOver() { playTone(100, 'square', 1.0, 0.3); }

    function initGame() {
      // Init audio if needed
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioDest = audioCtx.createMediaStreamDestination();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();

      score = 0;
      document.getElementById('lblScore').innerText = score;
      player.x = 270 - player.w/2;
      bullets = [];
      enemies = [];
      particles = [];
      floatingTexts = [];
      shakeTime = 0;
    }

    function spawnEnemy() {
      if (Math.random() < 0.05) {
        let eType = Math.floor(Math.random() * enemyImages.length);
        let speed = 2 + Math.random() * 2;
        let hp = 1;
        let w = 50, h = 50;
        
        // Behavioral tweaks mapped to the 23 types
        const tanks = [1, 6, 14, 17, 22, 25]; // alien-stare
        const fast = [2, 7, 16, 23, 24, 29]; // rocket, scout-ship, jet-fighter
        const wavy = [3, 8, 12, 15, 20, 26]; // glider
        const swarms = [4, 11, 21, 28]; // grease-trap
        const zigzag = [5, 10, 13, 27]; // drill

        if (tanks.includes(eType)) { speed = 1.5; hp = 2; w = 65; h = 65; }
        if (fast.includes(eType)) { speed = 5; }
        if (swarms.includes(eType)) { speed = 4; w = 35; h = 35; }
        
        enemies.push({ 
          x: Math.random() * (canvas.width - 50), 
          y: -50, 
          w: w, 
          h: h, 
          type: eType,
          speed: speed,
          hp: hp,
          isWavy: wavy.includes(eType),
          isZigzag: zigzag.includes(eType),
          spawnTime: Date.now() // Used for math movement
        });
      }
    }

    function update() {
      if (!isPlaying) return;

      // --- AI AUTO-PLAYER LOGIC ---
      let targetEnemy = null;
      let maxThreat = -Infinity;
      
      // Calculate threat levels (Intelligent Targeting)
      enemies.forEach(e => {
        let dist = Math.abs((e.x + e.w/2) - (player.x + player.w/2));
        // Prioritize enemies that are lower down (higher Y), but consider distance travel time
        let threat = e.y - (dist * 0.4); 
        if (threat > maxThreat) {
          maxThreat = threat;
          targetEnemy = e;
        }
      });

      if (targetEnemy) {
        // Predictive Tracking
        let targetX = targetEnemy.x + targetEnemy.w/2;
        
        // Lead the shot based on mathematical movement flags
        if (targetEnemy.isWavy) targetX += Math.cos((Date.now() - targetEnemy.spawnTime) / 200) * 25;
        if (targetEnemy.isZigzag) targetX -= Math.sin((Date.now() - targetEnemy.spawnTime) / 150) * 30;
        
        let desiredX = targetX - player.w/2;
        
        // Smooth Interpolation (Easing) instead of rigid snapping
        player.x += (desiredX - player.x) * 0.15;
      }
      
      // Auto-shoot constantly
      if (Math.random() < 0.2) {
        if (bullets.length === 0 || bullets[bullets.length - 1].y < player.y - 30) {
          bullets.push({ x: player.x + player.w/2 - 2.5, y: player.y, w: 5, h: 20, speed: 15 });
          playShoot();
        }
      }
      // ----------------------------

      // Update bullets
      bullets.forEach(b => b.y -= b.speed);
      bullets = bullets.filter(b => b.y > -20);

      // Update enemies
      spawnEnemy();
      for (let i = enemies.length - 1; i >= 0; i--) {
        let e = enemies[i];
        e.y += e.speed;
        
        // Special horizontal movements
        if (e.isWavy) e.x += Math.sin((Date.now() - e.spawnTime) / 200) * 3;
        if (e.isZigzag) e.x += Math.cos((Date.now() - e.spawnTime) / 150) * 4;

        // Keep within bounds
        e.x = Math.max(0, Math.min(canvas.width - e.w, e.x));

        if (e.y > canvas.height) {
          enemies.splice(i, 1);
          continue;
        }
      }
      
      // Update particles
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 1;
        p.size *= 0.95; // shrink
      });
      particles = particles.filter(p => p.life > 0);

      // Update floating texts
      floatingTexts.forEach(ft => {
        ft.y -= 1;
        ft.life -= 1;
      });
      floatingTexts = floatingTexts.filter(ft => ft.life > 0);

      // Update background parallax
      bgY1 = (bgY1 + 0.5) % canvas.height;
      bgY2 = (bgY2 + 1.5) % canvas.height;
      bgY3 = (bgY3 + 3.0) % canvas.height;

      // Reduce shake
      if (shakeTime > 0) shakeTime--;

      // Collision detection (Bullet hits Enemy)
      for (let i = enemies.length - 1; i >= 0; i--) {
        for (let j = bullets.length - 1; j >= 0; j--) {
          const e = enemies[i];
          const b = bullets[j];
          if (!e || !b) continue;
          
          if (b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
            e.hp -= 1;
            bullets.splice(j, 1);
            
            if (e.hp <= 0) {
              // Spawn explosion particles
              for(let k=0; k<10; k++) {
                particles.push({
                  x: e.x + e.w/2, y: e.y + e.h/2,
                  vx: (Math.random() - 0.5) * 15, vy: (Math.random() - 0.5) * 15,
                  life: 30 + Math.random() * 20,
                  size: 3 + Math.random() * 5,
                  color: Math.random() > 0.5 ? '#f97316' : '#ef4444'
                });
              }
              shakeTime = 10; // Screen shake
              playExplosion();
              score += 10;
              document.getElementById('lblScore').innerText = score;
              floatingTexts.push({ x: e.x + e.w/2, y: e.y, text: '+10', life: 40 });
              enemies.splice(i, 1);
            }
            break;
          }
        }
      }

      // Check game over (Enemy hits Player)
      enemies.forEach(e => {
        if (player.x < e.x + e.w && player.x + player.w > e.x && player.y < e.y + e.h && player.y + player.h > e.y) {
          shakeTime = 30;
          playGameOver();
          triggerGameOver();
        }
      });
      
      enemies = enemies.filter(e => e.y < canvas.height);
    }

    function draw() {
      ctx.save();
      
      // Screen Shake
      if (shakeTime > 0) {
        const magnitude = (shakeTime / 30) * 10;
        const dx = (Math.random() - 0.5) * magnitude;
        const dy = (Math.random() - 0.5) * magnitude;
        ctx.translate(dx, dy);
      }

      // Deep Space Gradient Background
      ctx.fillStyle = bgGradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Parallax Stars
      ctx.fillStyle = '#ffffff';
      const drawLayer = (layer, yOffset, opacity) => {
        ctx.globalAlpha = opacity;
        layer.forEach(s => {
          let y = (s.y + yOffset) % canvas.height;
          ctx.beginPath();
          ctx.arc(s.x, y, s.r, 0, Math.PI*2);
          ctx.fill();
        });
      };
      drawLayer(starLayers[0], bgY1, 0.3);
      drawLayer(starLayers[1], bgY2, 0.6);
      drawLayer(starLayers[2], bgY3, 1.0);
      ctx.globalAlpha = 1.0;

      // Draw Player
      if (playerImg.complete) {
        ctx.drawImage(playerImg, player.x, player.y, player.w, player.h);
      }
      
      // Engine thrust glow (Vibrant Fake Glow)
      ctx.globalCompositeOperation = 'screen';
      ctx.fillStyle = 'rgba(34, 211, 238, 0.5)'; // vibrant cyan outer
      ctx.fillRect(player.x - 20, player.y + player.h - 10, player.w + 40, 30 + Math.random()*15);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.9)'; // white hot inner core
      ctx.fillRect(player.x + 10, player.y + player.h - 5, player.w - 20, 15 + Math.random()*10);
      ctx.globalCompositeOperation = 'source-over';

      // Bullets (Laser beams with fast fake bloom)
      bullets.forEach(b => {
        // Outer glow
        ctx.fillStyle = 'rgba(217, 70, 239, 0.4)'; // fuchsia semi-transparent
        ctx.fillRect(b.x - 3, b.y - 3, b.w + 6, b.h + 6);
        // Inner core
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(b.x, b.y, b.w, b.h);
      });

      // Enemies (Image sprites)
      enemies.forEach(e => {
        if (enemyImages[e.type].complete) {
          ctx.drawImage(enemyImages[e.type], e.x, e.y, e.w, e.h);
        }
      });

      // Particles (Fiery debris)
      ctx.globalCompositeOperation = 'screen';
      particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life / 50;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        ctx.fill();
      });
      ctx.globalAlpha = 1.0;
      ctx.globalCompositeOperation = 'source-over';

      // Floating Texts
      ctx.font = "bold 20px monospace";
      ctx.textAlign = "center";
      floatingTexts.forEach(ft => {
        ctx.fillStyle = `rgba(134, 239, 172, ${ft.life / 40})`; // green-300
        ctx.fillText(ft.text, ft.x, ft.y);
      });

      // Arcade Scanlines
      ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
      for(let i=0; i<canvas.height; i+=4) {
        ctx.fillRect(0, i, canvas.width, 2);
      }

      ctx.restore();
    }

    function loop() {
      update();
      draw();
      if (isPlaying) {
        animationId = requestAnimationFrame(loop);
      }
    }

    // --- RECORDING LOGIC ---
    let isInfinite = false;
    
    document.getElementById('btnInfiniteToggle').addEventListener('click', () => {
      isInfinite = !isInfinite;
      const btn = document.getElementById('btnInfiniteToggle');
      const inp = document.getElementById('inpLoopCount');
      if (isInfinite) {
        btn.classList.add('bg-purple-600', 'border-purple-500');
        btn.classList.remove('bg-slate-700', 'border-slate-600');
        inp.disabled = true;
        inp.classList.add('opacity-50');
      } else {
        btn.classList.remove('bg-purple-600', 'border-purple-500');
        btn.classList.add('bg-slate-700', 'border-slate-600');
        inp.disabled = false;
        inp.classList.remove('opacity-50');
      }
    });

    document.getElementById('btnStart').addEventListener('click', () => {
      loopCountTarget = isInfinite ? -1 : parseInt(document.getElementById('inpLoopCount').value || 1);
      currentLoop = 0;
      startRun();
    });

    function startRun() {
      if (isUploading) return; // wait for upload
      currentLoop++;
      initGame();
      isPlaying = true;
      recordedChunks = [];
      
      // Capture stream at 60 FPS
      const videoStream = canvas.captureStream(60);
      const audioStream = audioDest.stream;
      
      // Combine video and audio tracks
      const combinedStream = new MediaStream([
        ...videoStream.getVideoTracks(),
        ...audioStream.getAudioTracks()
      ]);

      mediaRecorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm' });
      
      mediaRecorder.ondataavailable = e => {
        if (e.data.size > 0) recordedChunks.push(e.data);
      };

      mediaRecorder.start();
      
      document.getElementById('btnStart').disabled = true;
      document.getElementById('btnStart').classList.add('opacity-50', 'cursor-not-allowed');
      document.getElementById('btnStop').disabled = false;
      document.getElementById('btnStop').classList.remove('opacity-50', 'cursor-not-allowed');
      document.getElementById('statusIndicator').innerText = loopCountTarget === -1 ? `🔴 Recording Infinite Loop (${currentLoop})` : `🔴 Recording Loop ${currentLoop}/${loopCountTarget}`;
      document.getElementById('statusIndicator').className = 'bg-red-900 text-red-300 px-4 py-2 rounded-full border border-red-700 font-bold';
      
      loop();
    }

    document.getElementById('btnStop').addEventListener('click', () => {
      loopCountTarget = 0; // Force break loop
      triggerGameOver();
    });

    function triggerGameOver() {
      if (!isPlaying) return;
      isPlaying = false;
      cancelAnimationFrame(animationId);
      
      mediaRecorder.stop();
      isUploading = true;
      document.getElementById('btnStop').disabled = true;
      document.getElementById('btnStop').classList.add('opacity-50', 'cursor-not-allowed');
      
      document.getElementById('statusIndicator').innerText = "Processing Video...";
      document.getElementById('statusIndicator').className = "bg-yellow-900 text-yellow-300 px-4 py-2 rounded-full border border-yellow-700 font-bold";
      document.getElementById('uploadProgress').classList.remove('hidden');

      mediaRecorder.onstop = async () => {
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        const formData = new FormData();
        formData.append('video', blob, 'recording.webm');
        formData.append('score', score);

        try {
          const res = await fetch(`${backendUrl}/api/recordings/upload`, {
            method: 'POST',
            body: formData
          });
          
          if(res.ok) {
            loadLibrary();
          }
        } catch (e) {
          console.error(e);
        } finally {
          isUploading = false;
          document.getElementById('uploadProgress').classList.add('hidden');
          
          // Check if we should loop again
          if (loopCountTarget === -1 || currentLoop < loopCountTarget) {
            setTimeout(startRun, 1000); // Wait 1s and start next loop
          } else {
            document.getElementById('statusIndicator').innerText = "Ready";
            document.getElementById('statusIndicator').className = "bg-slate-800 text-slate-300 px-4 py-2 rounded-full border border-slate-700 font-bold";
            document.getElementById('btnStart').disabled = false;
            document.getElementById('btnStart').classList.remove('opacity-50', 'cursor-not-allowed');
            alert('All requested videos have been generated!');
          }
        }
      };
    }

    // --- LIBRARY LOGIC ---
    async function loadLibrary() {
      const list = document.getElementById('libraryList');
      try {
        const res = await fetch(`${backendUrl}/api/recordings`);
        const files = await res.json();
        
        if (files.length === 0) {
          list.innerHTML = "<div class='text-slate-400 p-4 bg-slate-900 rounded border border-slate-700'>No videos generated yet.</div>";
          return;
        }
        list.innerHTML = files.map(f => `
          <div class="flex justify-between items-center bg-slate-900 p-3 rounded border border-slate-700 mb-2 hover:border-slate-500 transition">
            <span class="font-mono text-sm">${f}</span>
            <div class="flex gap-3">
              <button onclick="renameVideo('${f}')" class="text-yellow-400 hover:text-yellow-300 text-sm font-bold">Rename</button>
              <button onclick="deleteVideo('${f}')" class="text-red-400 hover:text-red-300 text-sm font-bold">Delete</button>
              <a href="${backendUrl}/recordings/${f}" target="_blank" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded text-sm font-bold ml-2">View</a>
            </div>
          </div>
        `).join('');
      } catch (e) {
        list.innerHTML = "<div class='text-red-400'>Error loading library</div>";
      }
    }

    async function deleteVideo(filename) {
      if (!confirm(`Are you sure you want to delete ${filename}?`)) return;
      try {
        const res = await fetch(`${backendUrl}/api/recordings/${filename}`, { method: 'DELETE' });
        if (res.ok) loadLibrary();
        else alert('Failed to delete video');
      } catch (e) {
        alert('Error deleting video');
      }
    }

    async function renameVideo(filename) {
      const newName = prompt(`Enter new name for ${filename}:`, filename.replace('.mp4', ''));
      if (!newName || newName.trim() === '') return;
      
      try {
        const res = await fetch(`${backendUrl}/api/recordings/${filename}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ newFilename: newName })
        });
        if (res.ok) loadLibrary();
        else alert('Failed to rename video');
      } catch (e) {
        alert('Error renaming video');
      }
    }

    // Init
    initGame();
    loadLibrary();
  </script>
</body>
